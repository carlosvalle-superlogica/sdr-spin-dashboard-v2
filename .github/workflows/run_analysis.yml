name: Executar Auditoria de SDRs

on:
  workflow_dispatch:

# Permissão obrigatória para o robô poder salvar os arquivos de volta no repositório
permissions:
  contents: write

jobs:
  audit_calls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar script de analise
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python process_calls.py

      - name: Salvar e Atualizar Banco de Dados
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Robô"
          
          # Adiciona a pasta de análises e o arquivo consolidado
          git add analises_salvas/ consolidated_data.json || true
          
          # Salva as alterações (se houver alguma novidade)
          git commit -m "🤖 Atualização Automática: Novas análises de ligações" || echo "Nenhuma nova ligação para salvar"
          
          # Empurra os arquivos atualizados para o seu repositório
          git push
